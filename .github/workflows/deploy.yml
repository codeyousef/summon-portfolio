name: Deploy to Cloud Run (dev/prod)

on:
  push:
    branches: [ dev, master ]

# Non-secret constants (edit if you ever rename stuff)
env:
  SERVICE_BASE: portfolio                 # => master: portfolio, dev: portfolio-dev
  CONTAINER_REPO: portfolio-registry      # Artifact Registry repo
  GCP_PROJECT_ID: portfolio-476219        # <-- your project ID (not name)
  GCP_REGION: us-central1                 # region
  PHOTOGRAPHY_UPLOAD_BUCKET: portfolio-476219-portfolio-uploads

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google Cloud (service-account JSON)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      # Compute the service name without using expressions in env
      - name: Compute service name
        id: svc
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" = "master" ]; then
            echo "name=${SERVICE_BASE}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${SERVICE_BASE}-${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # Robust Docker auth to Artifact Registry (no configure-docker args)
      - name: Docker auth for Artifact Registry
        shell: bash
        run: |
          HOST="${GCP_REGION}-docker.pkg.dev"
          gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin "https://${HOST}"

      # Download Seen compiler tools from GCS for playground feature
      # Upload new versions with: gsutil cp -r seen-tools/ gs://seen-compiler-tools/
      - name: Download Seen compiler tools
        shell: bash
        run: |
          mkdir -p seen-tools
          gsutil -m cp -r gs://seen-compiler-tools/* seen-tools/ || {
            echo "Warning: Seen tools not found in GCS. Playground will be disabled."
            echo "Upload with: gsutil cp -r seen-tools/ gs://seen-compiler-tools/"
          }
          if [ ! -f seen-tools/seen ]; then
            mkdir -p seen-tools/seen_runtime seen-tools/languages
            printf '%s\n' \
              '#!/usr/bin/env sh' \
              'echo "Seen playground unavailable: compiler tools were not downloaded for this build." >&2' \
              'exit 1' > seen-tools/seen
          fi
          chmod +x seen-tools/seen

      # Build and push image with Docker
      - name: Build & Push
        id: bp
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${CONTAINER_REPO}/${{ steps.svc.outputs.name }}:${GITHUB_SHA}"
          echo "IMAGE=${IMAGE}"
          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Prepare photography upload bucket
        shell: bash
        run: |
          set -euo pipefail
          BUCKET_URI="gs://${PHOTOGRAPHY_UPLOAD_BUCKET}"
          if ! gcloud storage buckets describe "${BUCKET_URI}" >/dev/null 2>&1; then
            gcloud storage buckets create "${BUCKET_URI}" \
              --project "${GCP_PROJECT_ID}" \
              --location "${GCP_REGION}" \
              --uniform-bucket-level-access
          fi

          PROJECT_NUMBER="$(gcloud projects describe "${GCP_PROJECT_ID}" --format='value(projectNumber)')"
          EXISTING_SERVICE_ACCOUNT="$(gcloud run services describe "${{ steps.svc.outputs.name }}" \
            --region "${GCP_REGION}" \
            --format='value(spec.template.spec.serviceAccountName)' 2>/dev/null || true)"
          RUNTIME_SERVICE_ACCOUNT="${EXISTING_SERVICE_ACCOUNT:-${PROJECT_NUMBER}-compute@developer.gserviceaccount.com}"
          gcloud storage buckets add-iam-policy-binding "${BUCKET_URI}" \
            --member "serviceAccount:${RUNTIME_SERVICE_ACCOUNT}" \
            --role "roles/storage.objectAdmin" \
            --condition=None >/dev/null

      - name: Deploy to Cloud Run
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_LIMITS=()
          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            # Aether buffers request bodies before middleware. Keep the public
            # development gateway's worst-case buffered body set bounded.
            DEPLOY_LIMITS=(--memory 2Gi --concurrency 4 --max-instances 3)
          fi
          gcloud run deploy "${{ steps.svc.outputs.name }}" \
            --image "${{ steps.bp.outputs.image }}" \
            --region "${GCP_REGION}" \
            --update-env-vars "GOOGLE_CLOUD_PROJECT=${GCP_PROJECT_ID},PHOTOGRAPHY_UPLOAD_BUCKET=${PHOTOGRAPHY_UPLOAD_BUCKET},PHOTOGRAPHY_UPLOAD_PREFIX=photography/${{ steps.svc.outputs.name }}" \
            --allow-unauthenticated \
            --port 8080 \
            "${DEPLOY_LIMITS[@]}"

      - name: Show Service URL
        shell: bash
        run: |
          gcloud run services describe "${{ steps.svc.outputs.name }}" \
            --region "${GCP_REGION}" \
            --format='value(status.url)'
