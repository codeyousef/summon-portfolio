name: Deploy portfolio development to Cloud Run

on:
  push:
    branches: [dev]

concurrency:
  group: portfolio-deploy-development
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  SERVICE_BASE: portfolio
  CONTAINER_REPO: portfolio-registry
  GCP_PROJECT_ID: portfolio-476219
  GCP_REGION: us-central1
  PHOTOGRAPHY_UPLOAD_BUCKET: portfolio-476219-portfolio-uploads
  SEEN_REGISTRY_PUBLIC_HOST: seen.dev.yousef.codes
  SEEN_REGISTRY_UPSTREAM_URL: https://seen-registry-dev-api-v2-ur6lw2377q-uc.a.run.app
  SEEN_REGISTRY_RELEASE_ACTIONS_UPSTREAM_URL: https://seen-registry-dev-release-actions-v2-ur6lw2377q-uc.a.run.app
  SEEN_REGISTRY_SECURITY_ACTIONS_UPSTREAM_URL: https://seen-registry-dev-security-actions-v2-ur6lw2377q-uc.a.run.app

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: portfolio-development
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}
      service: ${{ steps.target.outputs.service }}
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Test portfolio before publication
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8 -Dorg.gradle.workers.max=2
        run: ./gradlew --no-daemon --max-workers=2 test

      - name: Select scoped development identities
        id: target
        env:
          DEV_IMAGE_PUBLISHER: ${{ vars.GCP_PORTFOLIO_DEV_IMAGE_PUBLISHER_SERVICE_ACCOUNT }}
          DEV_DEPLOYER: ${{ vars.GCP_PORTFOLIO_DEV_DEPLOYER_SERVICE_ACCOUNT }}
          DEV_RUNTIME: ${{ vars.GCP_PORTFOLIO_DEV_RUNTIME_SERVICE_ACCOUNT }}
          PROVIDER: ${{ vars.GCP_PORTFOLIO_WORKLOAD_IDENTITY_PROVIDER }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "${PROVIDER}" || { echo "GCP_PORTFOLIO_WORKLOAD_IDENTITY_PROVIDER is not configured" >&2; exit 1; }
          test -n "${DEV_IMAGE_PUBLISHER}" || { echo "Scoped portfolio dev image publisher is not configured" >&2; exit 1; }
          test -n "${DEV_DEPLOYER}" || { echo "Scoped portfolio dev deployer is not configured" >&2; exit 1; }
          test -n "${DEV_RUNTIME}" || { echo "Scoped portfolio dev runtime is not configured" >&2; exit 1; }
          echo "service=${SERVICE_BASE}-dev" >> "${GITHUB_OUTPUT}"
          echo "publisher=${DEV_IMAGE_PUBLISHER}" >> "${GITHUB_OUTPUT}"
          echo "deployer=${DEV_DEPLOYER}" >> "${GITHUB_OUTPUT}"
          echo "runtime=${DEV_RUNTIME}" >> "${GITHUB_OUTPUT}"

      - name: Authenticate image publisher with GitHub OIDC
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_PORTFOLIO_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ steps.target.outputs.publisher }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Download Seen compiler tools
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p seen-tools
          gcloud storage cp --recursive "gs://seen-compiler-tools/*" seen-tools/
          test -f seen-tools/seen || { echo "Seen compiler executable is missing" >&2; exit 1; }
          chmod +x seen-tools/seen

      - name: Build image locally
        shell: bash
        run: |
          set -euo pipefail
          image_name="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${CONTAINER_REPO}/${{ steps.target.outputs.service }}"
          image_tag="${image_name}:${GITHUB_SHA}"
          docker build --tag "${image_tag}" .

      - name: Refresh image-publisher authentication
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_PORTFOLIO_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ steps.target.outputs.publisher }}

      - name: Authenticate Docker to Artifact Registry
        shell: bash
        run: |
          set -euo pipefail
          gcloud auth print-access-token | \
            docker login \
              --username oauth2accesstoken \
              --password-stdin \
              "https://${GCP_REGION}-docker.pkg.dev"

      - name: Publish immutable image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image_name="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${CONTAINER_REPO}/${{ steps.target.outputs.service }}"
          image_tag="${image_name}:${GITHUB_SHA}"
          docker push "${image_tag}"
          digest="$(gcloud artifacts docker images describe "${image_tag}" --format='value(image_summary.digest)')"
          [[ "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]] || { echo "Artifact Registry did not return an immutable digest" >&2; exit 1; }
          echo "uri=${image_name}@${digest}" >> "${GITHUB_OUTPUT}"

      - name: Authenticate scoped Cloud Run deployer
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_PORTFOLIO_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ steps.target.outputs.deployer }}

      - name: Verify deployer identity without changing traffic
        shell: bash
        run: |
          set -euo pipefail
          runtime="$(gcloud run services describe "${{ steps.target.outputs.service }}" \
            --region "${GCP_REGION}" \
            --format='value(spec.template.spec.serviceAccountName)')"
          test "${runtime}" = "${{ steps.target.outputs.runtime }}" || {
            echo "portfolio-dev is not using the reviewed runtime identity" >&2
            exit 1
          }
          echo "Verified scoped publisher and deployer identities; no traffic changed." >> "${GITHUB_STEP_SUMMARY}"

  deploy:
    needs: build-and-verify
    if: ${{ vars.PORTFOLIO_DEV_DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: portfolio-development
    steps:
      - name: Validate explicit deployment inputs
        env:
          DEPLOYER: ${{ vars.GCP_PORTFOLIO_DEV_DEPLOYER_SERVICE_ACCOUNT }}
          PROVIDER: ${{ vars.GCP_PORTFOLIO_WORKLOAD_IDENTITY_PROVIDER }}
          RUNTIME: ${{ vars.GCP_PORTFOLIO_DEV_RUNTIME_SERVICE_ACCOUNT }}
          IMAGE_URI: ${{ needs.build-and-verify.outputs.image_uri }}
          SERVICE: ${{ needs.build-and-verify.outputs.service }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "${PROVIDER}"
          test -n "${DEPLOYER}"
          test -n "${RUNTIME}"
          [[ "${IMAGE_URI}" =~ @sha256:[0-9a-f]{64}$ ]]
          test "${SERVICE}" = "${SERVICE_BASE}-dev"

      - name: Authenticate scoped Cloud Run deployer
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ vars.GCP_PORTFOLIO_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_PORTFOLIO_DEV_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Capture resolved served traffic
        id: before
        shell: bash
        run: |
          set -euo pipefail
          service_json="$(gcloud run services describe "${{ needs.build-and-verify.outputs.service }}" \
            --region "${GCP_REGION}" \
            --format=json)"
          served_traffic="$(jq -c \
            '[.status.traffic[]? | select((.percent // 0) > 0) | {revisionName, percent}]
              | sort_by(.revisionName)
              | group_by(.revisionName)
              | map({revisionName: .[0].revisionName, percent: (map(.percent) | add)})
              | sort_by(.revisionName)' \
            <<<"${service_json}")"
          jq -e '
            length > 0 and
            (map(.percent) | add) == 100 and
            (map(.revisionName) | unique | length) == length and
            all(.[];
              (.revisionName | type == "string") and
              (.revisionName | test("^[a-z0-9]([-a-z0-9]*[a-z0-9])?$")) and
              (.percent | type == "number") and
              .percent > 0
            )
          ' \
            <<<"${served_traffic}" >/dev/null
          echo "served_traffic=${served_traffic}" >> "${GITHUB_OUTPUT}"

      - name: Deploy immutable image after explicit enablement
        shell: bash
        run: |
          set -euo pipefail
          gcloud run deploy "${{ needs.build-and-verify.outputs.service }}" \
            --image "${{ needs.build-and-verify.outputs.image_uri }}" \
            --region "${GCP_REGION}" \
            --service-account "${{ vars.GCP_PORTFOLIO_DEV_RUNTIME_SERVICE_ACCOUNT }}" \
            --update-env-vars "GOOGLE_CLOUD_PROJECT=${GCP_PROJECT_ID},PHOTOGRAPHY_UPLOAD_BUCKET=${PHOTOGRAPHY_UPLOAD_BUCKET},PHOTOGRAPHY_UPLOAD_PREFIX=photography/${{ needs.build-and-verify.outputs.service }},SEEN_REGISTRY_PUBLIC_HOST=${SEEN_REGISTRY_PUBLIC_HOST},SEEN_REGISTRY_UPSTREAM_URL=${SEEN_REGISTRY_UPSTREAM_URL},SEEN_REGISTRY_RELEASE_ACTIONS_UPSTREAM_URL=${SEEN_REGISTRY_RELEASE_ACTIONS_UPSTREAM_URL},SEEN_REGISTRY_SECURITY_ACTIONS_UPSTREAM_URL=${SEEN_REGISTRY_SECURITY_ACTIONS_UPSTREAM_URL}" \
            --port 8080 \
            --quiet \
            --memory 2Gi \
            --concurrency 4 \
            --max-instances 3 \
            --no-traffic \
            --tag runtime-canary

      - name: Verify zero-traffic candidate
        id: candidate
        env:
          PREVIOUS_TRAFFIC: ${{ steps.before.outputs.served_traffic }}
        shell: bash
        run: |
          set -euo pipefail
          service_json="$(gcloud run services describe "${{ needs.build-and-verify.outputs.service }}" \
            --region "${GCP_REGION}" \
            --format=json)"
          candidate="$(jq -c '[.status.traffic[]? | select(.tag == "runtime-canary")]' <<<"${service_json}")"
          jq -e 'length == 1 and .[0].url != null and .[0].url != "" and .[0].revisionName != null and .[0].revisionName != ""' \
            <<<"${candidate}" >/dev/null
          url="$(jq -r '.[0].url' <<<"${candidate}")"
          revision="$(jq -r '.[0].revisionName' <<<"${candidate}")"
          [[ "${url}" == https://* ]]
          [[ "${revision}" =~ ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$ ]]

          served_traffic="$(jq -c \
            '[.status.traffic[]? | select((.percent // 0) > 0) | {revisionName, percent}]
              | sort_by(.revisionName)
              | group_by(.revisionName)
              | map({revisionName: .[0].revisionName, percent: (map(.percent) | add)})
              | sort_by(.revisionName)' \
            <<<"${service_json}")"
          jq -e '
            length > 0 and
            (map(.percent) | add) == 100 and
            all(.[];
              (.revisionName | type == "string") and
              (.revisionName | test("^[a-z0-9]([-a-z0-9]*[a-z0-9])?$")) and
              (.percent | type == "number") and
              .percent > 0
            )
          ' \
            <<<"${served_traffic}" >/dev/null
          test "${served_traffic}" = "${PREVIOUS_TRAFFIC}"

          candidate_percent="$(jq --arg revision "${revision}" \
            '[.status.traffic[]? | select(.revisionName == $revision) | (.percent // 0)] | add // 0' \
            <<<"${service_json}")"
          test "${candidate_percent}" = "0"

          revision_json="$(gcloud run revisions describe "${revision}" \
            --region "${GCP_REGION}" \
            --format=json)"
          test "$(jq -r '.spec.serviceAccountName' <<<"${revision_json}")" = "${{ vars.GCP_PORTFOLIO_DEV_RUNTIME_SERVICE_ACCOUNT }}"
          test "$(jq -r '.spec.containers[0].image' <<<"${revision_json}")" = "${{ needs.build-and-verify.outputs.image_uri }}"
          jq -e --arg value "${SEEN_REGISTRY_PUBLIC_HOST}" \
            '.spec.containers[0].env | any(.name == "SEEN_REGISTRY_PUBLIC_HOST" and .value == $value)' \
            <<<"${revision_json}" >/dev/null
          jq -e --arg value "${SEEN_REGISTRY_UPSTREAM_URL}" \
            '.spec.containers[0].env | any(.name == "SEEN_REGISTRY_UPSTREAM_URL" and .value == $value)' \
            <<<"${revision_json}" >/dev/null
          jq -e --arg value "${SEEN_REGISTRY_RELEASE_ACTIONS_UPSTREAM_URL}" \
            '.spec.containers[0].env | any(.name == "SEEN_REGISTRY_RELEASE_ACTIONS_UPSTREAM_URL" and .value == $value)' \
            <<<"${revision_json}" >/dev/null
          jq -e --arg value "${SEEN_REGISTRY_SECURITY_ACTIONS_UPSTREAM_URL}" \
            '.spec.containers[0].env | any(.name == "SEEN_REGISTRY_SECURITY_ACTIONS_UPSTREAM_URL" and .value == $value)' \
            <<<"${revision_json}" >/dev/null
          jq -e '.status.conditions | any(.type == "Ready" and .status == "True")' \
            <<<"${revision_json}" >/dev/null
          curl --fail --silent --show-error --retry 12 --retry-all-errors --retry-delay 5 \
            --retry-max-time 180 --connect-timeout 10 --max-time 30 "${url}/" >/dev/null
          echo "revision=${revision}" >> "${GITHUB_OUTPUT}"
          echo "url=${url}" >> "${GITHUB_OUTPUT}"
          echo "Deployed ${{ needs.build-and-verify.outputs.image_uri }} to zero-traffic candidate ${revision} (${url})" >> "${GITHUB_STEP_SUMMARY}"

      - name: Promote verified candidate and smoke custom domains
        env:
          CANDIDATE_REVISION: ${{ steps.candidate.outputs.revision }}
          PREVIOUS_TRAFFIC: ${{ steps.before.outputs.served_traffic }}
          SERVICE: ${{ needs.build-and-verify.outputs.service }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "${CANDIDATE_REVISION}" =~ ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$ ]]
          test "${SERVICE}" = "${SERVICE_BASE}-dev"
          jq -e '
            length > 0 and
            (map(.percent) | add) == 100 and
            (map(.revisionName) | unique | length) == length and
            all(.[];
              (.revisionName | type == "string") and
              (.revisionName | test("^[a-z0-9]([-a-z0-9]*[a-z0-9])?$")) and
              (.percent | type == "number") and
              .percent > 0
            )
          ' <<<"${PREVIOUS_TRAFFIC}" >/dev/null
          restore_spec="$(jq -r 'map("\(.revisionName)=\(.percent)") | join(",")' <<<"${PREVIOUS_TRAFFIC}")"
          test -n "${restore_spec}"

          promotion_verified=false
          rollback_on_exit() {
            status=$?
            trap - EXIT
            if [[ "${promotion_verified}" == "true" ]]; then
              exit "${status}"
            fi

            if (( status == 0 )); then
              status=1
            fi
            echo "Promotion verification failed; restoring the previously served traffic." >&2

            set +e
            gcloud run services update-traffic "${SERVICE}" \
              --region "${GCP_REGION}" \
              --to-revisions "${restore_spec}" \
              --quiet
            rollback_status=$?
            restored_traffic=""
            if (( rollback_status == 0 )); then
              restored_json="$(gcloud run services describe "${SERVICE}" \
                --region "${GCP_REGION}" \
                --format=json)"
              rollback_status=$?
            fi
            if (( rollback_status == 0 )); then
              restored_traffic="$(jq -c \
                '[.status.traffic[]? | select((.percent // 0) > 0) | {revisionName, percent}]
                  | sort_by(.revisionName)
                  | group_by(.revisionName)
                  | map({revisionName: .[0].revisionName, percent: (map(.percent) | add)})
                  | sort_by(.revisionName)' \
                <<<"${restored_json}")"
              rollback_status=$?
            fi
            set -e

            if (( rollback_status == 0 )) && [[ "${restored_traffic}" == "${PREVIOUS_TRAFFIC}" ]]; then
              echo "Restored the pre-deployment traffic allocation after failed smoke tests." >> "${GITHUB_STEP_SUMMARY}"
            else
              echo "::error::Automatic traffic rollback did not restore the captured allocation."
              echo "Automatic traffic rollback failed; manual recovery is required." >> "${GITHUB_STEP_SUMMARY}"
            fi
            exit "${status}"
          }
          trap rollback_on_exit EXIT

          gcloud run services update-traffic "${SERVICE}" \
            --region "${GCP_REGION}" \
            --to-revisions "${CANDIDATE_REVISION}=100" \
            --quiet

          service_json="$(gcloud run services describe "${SERVICE}" \
            --region "${GCP_REGION}" \
            --format=json)"
          jq -e --arg revision "${CANDIDATE_REVISION}" '
            [.status.traffic[]? | select((.percent // 0) > 0)] as $served |
            ($served | map(.percent) | add) == 100 and
            ($served | all(.revisionName == $revision))
          ' <<<"${service_json}" >/dev/null

          custom_domain_revision=""
          convergence_deadline=$((SECONDS + 300))
          attempt=0
          while (( SECONDS < convergence_deadline )); do
            ((attempt += 1))
            version_json="$(curl --fail --silent --show-error \
              --connect-timeout 5 --max-time 10 \
              -H 'Cache-Control: no-cache' \
              'https://dev.yousef.codes/version' 2>/dev/null || true)"
            custom_domain_revision="$(jq -r '.revision // empty' <<<"${version_json}" 2>/dev/null || true)"
            if [[ "${custom_domain_revision}" == "${CANDIDATE_REVISION}" ]]; then
              break
            fi
            echo "Waiting for dev.yousef.codes to serve ${CANDIDATE_REVISION} (attempt ${attempt})."
            sleep 5
          done
          test "${custom_domain_revision}" = "${CANDIDATE_REVISION}"
          echo "Verified dev.yousef.codes is serving ${CANDIDATE_REVISION}." >> "${GITHUB_STEP_SUMMARY}"

          smoke_urls=(
            "https://dev.yousef.codes/"
            "https://dev.yousef.codes/projects"
            "https://dev.yousef.codes/services"
            "https://dev.yousef.codes/full-time"
            "https://dev.yousef.codes/photography"
            "https://dev.yousef.codes/scratchpad"
            "https://dev.yousef.codes/fifth-wall"
            "https://dev.yousef.codes/blog"
            "https://dev.yousef.codes/ar"
            "https://dev.yousef.codes/admin/login"
            "https://summon.dev.yousef.codes/"
            "https://summon.dev.yousef.codes/docs"
            "https://materia.dev.yousef.codes/"
            "https://sigil.dev.yousef.codes/"
            "https://aether.dev.yousef.codes/"
            "https://seen.dev.yousef.codes/"
            "https://seen.dev.yousef.codes/playground"
            "https://seen.dev.yousef.codes/packages"
            "https://seen.dev.yousef.codes/packages?q=seen"
            "https://seen.dev.yousef.codes/packages/api/v1/packages"
          )
          for smoke_url in "${smoke_urls[@]}"; do
            echo "Probing ${smoke_url}"
            curl --fail --location --max-redirs 5 --silent --show-error \
              --retry 12 --retry-all-errors --retry-delay 5 \
              --retry-max-time 180 --connect-timeout 10 --max-time 30 "${smoke_url}" >/dev/null
            echo "Verified ${smoke_url}" >> "${GITHUB_STEP_SUMMARY}"
          done

          promotion_verified=true
          trap - EXIT
          echo "Promoted verified revision ${CANDIDATE_REVISION} to 100% of ${SERVICE} traffic." >> "${GITHUB_STEP_SUMMARY}"
