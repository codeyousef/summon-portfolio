name: CI
on:
  push:
    branches: [dev, master]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Validate GitHub Actions workflows
        shell: bash
        run: |
          set -euo pipefail
          actionlint_version=1.7.7
          archive="actionlint_${actionlint_version}_linux_amd64.tar.gz"
          install_dir="${RUNNER_TEMP}/actionlint"
          mkdir -p "${install_dir}"
          curl --fail --location --silent --show-error \
            --output "${RUNNER_TEMP}/${archive}" \
            "https://github.com/rhysd/actionlint/releases/download/v${actionlint_version}/${archive}"
          echo "023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757  ${RUNNER_TEMP}/${archive}" | sha256sum --check --strict
          tar --extract --gzip --file "${RUNNER_TEMP}/${archive}" --directory "${install_dir}" actionlint
          "${install_dir}/actionlint" -color -ignore 'SC2129'
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build
        env:
          GRADLE_OPTS: -Xmx4g -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8
        run: ./gradlew --no-daemon --max-workers=2 build

  registry-tests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: |
            registry-service/*.gradle.kts
            registry-service/gradle.properties
      - name: Check registry deployment scripts
        run: bash -n registry-service/scripts/provision-development-owner.sh
      - name: Test isolated registry
        env:
          GRADLE_OPTS: -Xmx4g -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8
        run: |
          ./gradlew \
            -p registry-service \
            --no-daemon \
            --max-workers=2 \
            test
