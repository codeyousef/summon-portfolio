name: CI
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build
        env:
          GRADLE_OPTS: -Xmx4g -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8
        run: ./gradlew --no-daemon --max-workers=2 build

  registry-tests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
          cache-dependency-path: |
            registry-service/*.gradle.kts
            registry-service/gradle.properties
      - name: Check registry deployment scripts
        run: bash -n registry-service/scripts/provision-development-owner.sh
      - name: Test isolated registry
        env:
          GRADLE_OPTS: -Xmx4g -XX:MaxMetaspaceSize=768m -Dfile.encoding=UTF-8
        run: |
          ./gradlew \
            -p registry-service \
            --no-daemon \
            --max-workers=2 \
            test

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: portfolio-476219
      - name: Verify gcloud
        run: |
          gcloud auth list
          gcloud --quiet config set project portfolio-476219
          gcloud --version
