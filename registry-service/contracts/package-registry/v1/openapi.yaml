openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Seen package registry API
  version: 1.0.0
  summary: Versioned package publication and retrieval contract
  description: |
    Host-neutral HTTP contract for Seen package metadata, immutable release
    reservation, archive ingestion, release-state actions, source-proof and
    scan-attestation history, and archive download.

    Package identity, release state, source provenance, registry authorization,
    and account authentication are separate concerns. Aether issues and manages
    passkeys, sessions, and bearer credentials outside this API. This contract
    validates those credentials at the boundary and owns package/namespace
    authorization, reports, enforcement review, and namespace ownership changes.
    Registry namespace recovery never changes or recovers an Aether account.

    Public writer deployment remains disabled until the contract, storage,
    scanner, signing, authorization, and resolver gates are enabled together.
servers:
  - url: https://seen.dev.yousef.codes
    description: Development deployment
  - url: https://seen.yousef.codes
    description: Production deployment
tags:
  - name: Packages
    description: Package-level metadata and namespace reservation
  - name: Releases
    description: Immutable version reservation and release-state reads
  - name: Uploads
    description: Content-addressed archive ingestion
  - name: Source proofs
    description: Append-only forge verification records
  - name: Release actions
    description: Explicit availability, visibility, and retention transitions
  - name: Signed metadata
    description: Public, byte-exact TUF metadata delivery
  - name: Blobs
    description: Content-addressed package archive bytes
  - name: Reports
    description: Access-controlled ecosystem security reports
  - name: Enforcement
    description: Appeals, independent review, quarantine, and reinstatement
  - name: Namespaces
    description: Registry namespace transfer and ownership recovery workflows
x-seen-contract:
  api_prefix: /packages/api/v1
  privacy:
    public_listing: public-active-packages-only
    private_lookup: authenticated-and-authorized-only
    concealed_result: not_found
    total_counts: forbidden
  authorization:
    account_authentication_provider: external-aether
    credential_issuance_in_registry_api: false
    accepted_credential: short-lived-bearer
    required_claims:
      - iss
      - aud
      - sub
      - exp
      - auth_time
      - environment
      - scopes
    audience_and_environment_mismatch: reject
    recent_auth_max_age_seconds: 900
    recent_auth_claim: auth_time
    recent_auth_claim_type: jwt-numeric-date-seconds
    recent_auth_rule: server-now-minus-auth-time-must-be-between-negative-future-tolerance-and-operation-maximum
    future_auth_time_tolerance_seconds: 60
    authorization_order:
      - validate-token-boundary
      - reject-environment-or-audience-mismatch
      - apply-explicit-role-deny
      - require-operation-scope
      - authorize-resource-role
      - apply-recent-auth-and-separation-policy
    publisher_explicitly_denied_operations:
      - emergencySecurityQuarantineRelease
      - reviewEnforcementAppeal
      - reviewedReinstateRelease
      - reviewOwnershipRecovery
      - executeOwnershipRecovery
  timestamps:
    format: RFC3339
    timezone: UTC
    suffix: Z
    fractional_seconds: optional-up-to-9-digits
    client_ordering: forbidden
  pagination:
    style: opaque-cursor
    default_limit: 25
    maximum_limit: 100
    cursor_maximum_bytes: 512
    cursor_scope:
      - authenticated-principal
      - canonical-path
      - filters
      - sort-order
    response_fields:
      - items
      - next_cursor
      - has_more
  idempotency:
    required_on:
      - POST
      - DELETE
    key_minimum_bytes: 16
    key_maximum_bytes: 128
    retention_seconds: 86400
    scope:
      - authenticated-principal
      - HTTP-method
      - canonical-path
      - key
    fingerprint:
      - request-body-bytes
      - content-type
      - digest-headers
    same_fingerprint: replay-original-status-headers-and-body
    different_fingerprint: idempotency_key_reused
    replay_header: Idempotency-Replayed
  digests:
    algorithm: sha256
    json_encoding: lowercase-hex-without-prefix
    archive_header: X-Seen-Archive-Sha256
    etag_encoding: quoted-sha256-colon-lowercase-hex
    verification: stream-and-compare-before-promotion
    client_download_rule: compare-response-header-lockfile-and-computed-digest
  retry:
    authority: error.retryable
    delay: Retry-After-must-equal-error.retry_after_seconds
    mutation_rule: reuse-identical-body-and-idempotency-key
    strategy: bounded-exponential-backoff-with-jitter
  archive_policy:
    format: tar+gzip
    content_model: source-only
    compressed_bytes: 26214400
    expanded_bytes: 104857600
    entry_count: 4096
    regular_file_bytes: 10485760
    path_bytes: 240
    path_depth: 16
    compression_ratio: 100
    validation_seconds: 30
  release_invariants:
    reservation_tuple:
      - package
      - version
      - archive_sha256
    reservation: atomic-and-never-reusable
    archive_and_manifest: immutable
    archive_manifest_binding:
      authority: uploaded-archive-root-Seen.toml
      hash_input: exact-raw-Seen.toml-bytes
      required_matches:
        - reserved-manifest-sha256
        - reserved-parsed-manifest
        - path-package-identity
        - reserved-version
        - reserved-capabilities
        - reserved-include
        - reserved-assets
      include_evaluation: recompute-from-validated-archive-entry-paths
      mismatch: reject-before-ready-or-blob-promotion
    verification_records: append-only
    promotion_order:
      - verify-archive
      - promote-blob
      - publish-signed-resolver-metadata
    public_delay_seconds: 259200
    private_to_public: restart-public-quarantine-and-delay
x-seen-error-codes:
  invalid_request: {http_status: 400, retryable: false}
  invalid_package_identity: {http_status: 400, retryable: false}
  invalid_version: {http_status: 400, retryable: false}
  invalid_cursor: {http_status: 400, retryable: false}
  page_limit_exceeded: {http_status: 400, retryable: false}
  unauthenticated: {http_status: 401, retryable: false}
  forbidden: {http_status: 403, retryable: false}
  not_found: {http_status: 404, retryable: false}
  package_already_exists: {http_status: 409, retryable: false}
  version_already_reserved: {http_status: 409, retryable: false}
  idempotency_key_required: {http_status: 400, retryable: false}
  idempotency_key_reused: {http_status: 409, retryable: false}
  digest_required: {http_status: 400, retryable: false}
  digest_mismatch: {http_status: 422, retryable: false}
  archive_too_large: {http_status: 413, retryable: false}
  archive_rejected: {http_status: 422, retryable: false}
  source_proof_invalid: {http_status: 422, retryable: false}
  release_not_ready: {http_status: 409, retryable: true}
  release_unavailable: {http_status: 409, retryable: false}
  state_transition_forbidden: {http_status: 409, retryable: false}
  rate_limited: {http_status: 429, retryable: true}
  writer_disabled: {http_status: 503, retryable: false}
  temporarily_unavailable: {http_status: 503, retryable: true}
  internal_error: {http_status: 500, retryable: true}
paths:
  /packages/api/v1/packages:
    get:
      tags:
        - Packages
      operationId: listPublicPackages
      summary: List public packages
      description: |
        Returns only public, non-tombstoned package projections ordered by
        canonical identity ascending. The response never includes a total
        count. Authentication does not expand this public listing.
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Page of public packages
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackagePage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Packages
      operationId: createPackage
      summary: Reserve a package identity
      description: |
        Reserves a canonical package identity for the authenticated principal.
        Namespace authorization is evaluated separately from identity syntax.
        An identity that has ever had a public release is never recycled.
      security:
        - bearerAuth: []
      x-seen-required-scopes:
        - registry:packages:create
      x-seen-resource-authorization: namespace-create
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePackageRequest"
      responses:
        "201":
          description: Package identity reserved
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
            Location:
              $ref: "#/components/headers/ResourceLocation"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackageRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"
  /packages/api/v1/packages/{owner}/{name}:
    get:
      tags:
        - Packages
      operationId: getPackage
      summary: Get an exact package
      description: |
        Returns the public projection, or the authorized private projection when
        a bearer token is supplied. Missing and concealed private packages both
        return the identical not_found response.
      security:
        - {}
        - bearerAuth: []
      x-seen-optional-bearer-scope: registry:packages:read
      x-seen-resource-authorization: public-or-package-reader
      parameters:
        - $ref: "#/components/parameters/Owner"
        - $ref: "#/components/parameters/Name"
      responses:
        "200":
          description: Package record
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
            ETag:
              $ref: "#/components/headers/MetadataEtag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackageRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"
  /packages/api/v1/packages/{owner}/{name}/releases:
    get:
      tags:
        - Releases
      operationId: listPackageReleases
      summary: List releases for an exact package
      description: |
        Public callers see public releases that reached an externally visible
        lifecycle, including yanked releases. An authorized bearer may also see
        private and unavailable records for that package. Results are ordered by
        reserved_at descending and exact version ascending as a tie-breaker.
      security:
        - {}
        - bearerAuth: []
      x-seen-optional-bearer-scope: registry:packages:read
      x-seen-resource-authorization: public-or-package-reader
      parameters:
        - $ref: "#/components/parameters/Owner"
        - $ref: "#/components/parameters/Name"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Page of releases
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleasePage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Releases
      operationId: reserveRelease
      summary: Atomically reserve a version and archive digest
      description: |
        Atomically reserves package, exact version, and archive SHA-256 before
        returning an upload path. The manifest identity and version must equal
        the path and request version. The request manifest is a reservation
        commitment, not trusted archive metadata: validation reparses the root
        Seen.toml from the uploaded bytes and byte/field-matches it before the
        release can become ready. A reserved version is never reusable,
        including after rejection, yank, deletion, or purge.
      security:
        - bearerAuth: []
      x-seen-required-scopes:
        - registry:packages:publish
      x-seen-resource-authorization: package-publisher
      parameters:
        - $ref: "#/components/parameters/Owner"
        - $ref: "#/components/parameters/Name"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReserveReleaseRequest"
      responses:
        "201":
          description: Release reserved and upload session created
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
            Location:
              $ref: "#/components/headers/ResourceLocation"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseReservation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "422":
          $ref: "#/components/responses/Unprocessable"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"
  /packages/api/v1/packages/{owner}/{name}/releases/{version}:
    get:
      tags:
        - Releases
      operationId: getRelease
      summary: Get an exact release
      description: |
        Public callers may read public visible release records. Authorized
        callers may also read private and pre-activation state. Missing and
        concealed private releases return the identical not_found response.
      security:
        - {}
        - bearerAuth: []
      x-seen-optional-bearer-scope: registry:packages:read
      x-seen-resource-authorization: public-or-package-reader
      parameters:
        - $ref: "#/components/parameters/Owner"
        - $ref: "#/components/parameters/Name"
        - $ref: "#/components/parameters/Version"
      responses:
        "200":
          description: Release record
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
            ETag:
              $ref: "#/components/headers/MetadataEtag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags:
        - Release actions
      operationId: softDeletePrivateRelease
      summary: Soft-delete a private release
      description: |
        Soft-deletes a private release. Public releases cannot use this
        operation. The package, version, digest reservation, audit history, and
        retention record remain immutable.
      security:
        - bearerAuth: []
      x-seen-required-scopes:
        - registry:packages:delete
      x-seen-resource-authorization: package-owner
      parameters:
        - $ref: "#/components/parameters/Owner"
        - $ref: "#/components/parameters/Name"
        - $ref: "#/components/parameters/Version"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Updated release record
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"
  /packages/api/v1/packages/{owner}/{name}/releases/{version}/source-proofs:
    get:
      tags:
        - Source proofs
      operationId: listReleaseSourceProofs
      summary: List append-only source-proof history
      description: |
        Lists source proofs by sequence descending. Public callers see the
        proofs attached to public visible releases. Authorized callers may see
        pre-activation proof history. Evidence payloads and credentials are not
        exposed by this projection.
      security:
        - {}
        - bearerAuth: []
      x-seen-optional-bearer-scope: registry:packages:read
      x-seen-resource-authorization: public-or-package-reader
      parameters:
        - $ref: "#/components/parameters/Owner"
        - $ref: "#/components/parameters/Name"
        - $ref: "#/components/parameters/Version"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Page of source proofs
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceProofPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"
  /packages/api/v1/packages/{owner}/{name}/releases/{version}/source-proofs/{proof_id}:
    get:
      tags:
        - Source proofs
      operationId: getReleaseSourceProof
      summary: Get an exact source-proof record
      security:
        - {}
        - bearerAuth: []
      x-seen-optional-bearer-scope: registry:packages:read
      x-seen-resource-authorization: public-or-package-reader
      parameters:
        - $ref: "#/components/parameters/Owner"
        - $ref: "#/components/parameters/Name"
        - $ref: "#/components/parameters/Version"
        - $ref: "#/components/parameters/ProofId"
      responses:
        "200":
          description: Source-proof record
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
            ETag:
              $ref: "#/components/headers/MetadataEtag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceProof"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"
  /packages/api/v1/packages/{owner}/{name}/releases/{version}/download:
    get:
      tags:
        - Releases
      operationId: downloadRelease
      summary: Obtain the immutable release archive
      description: |
        Returns the exact immutable archive bytes, or redirects once to a
        content-addressed location that implements the identical 200 response
        contract. Bytes are available only after blob promotion and signed
        resolver metadata publication. X-Seen-Archive-Sha256, the strong ETag,
        release record, lockfile, and computed body digest must agree. Clients
        hash the complete body and fail closed before extraction on any mismatch.
        Public archives use immutable caching; private archives use no-store.
      security:
        - {}
        - bearerAuth: []
      x-seen-optional-bearer-scope: registry:packages:read
      x-seen-resource-authorization: public-or-package-reader
      parameters:
        - $ref: "#/components/parameters/Owner"
        - $ref: "#/components/parameters/Name"
        - $ref: "#/components/parameters/Version"
      responses:
        "200":
          description: Exact immutable tar+gzip package archive bytes
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
            X-Seen-Archive-Sha256:
              $ref: "#/components/headers/ArchiveSha256"
            ETag:
              $ref: "#/components/headers/ArchiveEtag"
            Content-Length:
              $ref: "#/components/headers/BlobContentLength"
            Cache-Control:
              $ref: "#/components/headers/BlobCacheControl"
          content:
            application/gzip:
              schema:
                type: string
                format: binary
                maxLength: 26214400
        "307":
          description: |
            Single redirect to a location that returns the exact 200 byte,
            digest, length, ETag, authorization, and cache contract above.
            Clients must not forward bearer credentials to a different origin;
            private cross-origin locations carry their authorization in a
            short-lived URL and must return Cache-Control private,no-store.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
            Location:
              $ref: "#/components/headers/DownloadLocation"
            X-Seen-Archive-Sha256:
              $ref: "#/components/headers/ArchiveSha256"
            ETag:
              $ref: "#/components/headers/ArchiveEtag"
            Cache-Control:
              description: public,max-age=31536000,immutable for public bytes; private,no-store for private bytes
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"
  /packages/api/v1/uploads/{upload_id}/archive:
    put:
      tags:
        - Uploads
      operationId: uploadReleaseArchive
      summary: Upload the reserved archive bytes
      description: |
        Streams one tar+gzip archive into quarantine. The declared digest,
        X-Seen-Archive-Sha256 header, reserved release digest, and computed
        digest must all be identical lowercase SHA-256 hex. A retry must send
        the complete identical body. Bytes are never promoted by this operation.
      security:
        - bearerAuth: []
      x-seen-required-scopes:
        - registry:packages:publish
      x-seen-resource-authorization: reserved-upload-owner
      parameters:
        - $ref: "#/components/parameters/UploadId"
        - $ref: "#/components/parameters/ArchiveDigestHeader"
        - $ref: "#/components/parameters/ContentLength"
      requestBody:
        required: true
        content:
          application/gzip:
            schema:
              type: string
              format: binary
              maxLength: 26214400
      responses:
        "204":
          description: Complete archive accepted into quarantine
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
            X-Seen-Archive-Sha256:
              $ref: "#/components/headers/ArchiveSha256"
            ETag:
              $ref: "#/components/headers/ArchiveEtag"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "422":
          $ref: "#/components/responses/Unprocessable"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"
  /packages/api/v1/uploads/{upload_id}/complete:
    post:
      tags:
        - Uploads
      operationId: completeReleaseUpload
      summary: Seal an upload and start validation
      description: |
        Seals the quarantine object after its complete digest and byte count are
        verified, then schedules archive validation, source verification, and
        scanning. Validation must locate exactly one regular root Seen.toml,
        SHA-256 its exact raw bytes, strictly parse it, and match the reserved
        manifest hash, complete parsed manifest, package identity, version,
        capabilities, include globs, and assets. Include membership is recomputed
        from validated archive paths and is never trusted from the client. Any
        mismatch rejects before ready state, blob promotion, or signed metadata.
        A 202 response does not make the release resolver-visible.
      security:
        - bearerAuth: []
      x-seen-required-scopes:
        - registry:packages:publish
      x-seen-resource-authorization: reserved-upload-owner
