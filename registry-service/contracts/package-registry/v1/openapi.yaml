      summary: Fetch a byte-exact signed TUF metadata envelope
      description: |
        Serves metadata only for this server's configured environment and
        repository. Versioned files are immutable and cacheable forever;
        unversioned timestamp metadata uses its short freshness policy. The
        body is the exact stored canonical envelope bytes covered by the
        response SHA-256 and strong ETag. There is no cross-environment or
        cross-repository fallback.
