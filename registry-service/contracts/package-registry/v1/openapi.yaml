          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"
  /packages/api/v1/namespace-transfers/{transfer_id}/actions/execute:
    post:
      tags:
        - Namespaces
      operationId: executeNamespaceTransfer
      summary: Execute an accepted namespace transfer after cooling
      description: |
        Requires a transfer participant with recent authentication. Execution
        fails until both owners accepted and 604800 seconds elapsed. It changes
        namespace authorization only; identities, versions, digests,
        attestations, tombstones, and history remain immutable.
      security:
        - bearerAuth: []
      x-seen-required-scopes:
        - registry:namespaces:transfer
      x-seen-resource-authorization: transfer-participant
      x-seen-requires-recent-auth-seconds: 900
      parameters:
        - $ref: "#/components/parameters/TransferId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NamespaceTransferExecuteRequest"
      responses:
        "200":
          $ref: "#/components/responses/NamespaceTransferUpdated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"
  /packages/api/v1/namespaces/{owner}/ownership-recoveries:
    post:
      tags:
        - Namespaces
      operationId: createOwnershipRecovery
      summary: Request recovery of an abandoned registry namespace
      description: |
        This recovers Seen registry namespace authorization only and never an
        Aether account, passkey, or session. A namespace with public release
        history is never recoverable. Eligible empty namespaces require 180
        days of inactivity, independent review, and a 30-day public notice.
      security:
        - bearerAuth: []
      x-seen-required-scopes:
        - registry:namespaces:recovery:create
      x-seen-resource-authorization: authenticated-recovery-claimant
      x-seen-requires-recent-auth-seconds: 900
      parameters:
        - $ref: "#/components/parameters/Owner"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OwnershipRecoveryCreateRequest"
      responses:
        "201":
          $ref: "#/components/responses/OwnershipRecoveryCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"
  /packages/api/v1/ownership-recoveries/{recovery_id}:
    get:
      tags:
        - Namespaces
      operationId: getOwnershipRecovery
      summary: Read an authorized namespace ownership-recovery record
      security:
        - bearerAuth: []
      x-seen-required-scopes:
        - registry:namespaces:recovery:read
      x-seen-resource-authorization: claimant-current-owner-or-namespace-reviewer
      parameters:
        - $ref: "#/components/parameters/RecoveryId"
      responses:
        "200":
          description: Authorized ownership-recovery record
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
            ETag:
              $ref: "#/components/headers/MetadataEtag"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipRecoveryRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"
  /packages/api/v1/ownership-recoveries/{recovery_id}/reviews:
    post:
      tags:
        - Namespaces
      operationId: reviewOwnershipRecovery
      summary: Independently review a namespace ownership-recovery claim
      description: |
        Registry namespace reviewers only. Publishers and claimants are
        explicitly denied. Approval starts the 30-day notice; it does not change
        namespace authorization and cannot override permanent public history.
      security:
        - bearerAuth: []
      x-seen-required-scopes:
        - registry:namespaces:recovery:review
      x-seen-required-actor-role: registry-namespace-reviewer
      x-seen-explicitly-denied-actor-roles:
        - publisher
        - recovery-claimant
      x-seen-requires-recent-auth-seconds: 900
      x-seen-separation-of-duties: reviewer-must-differ-from-claimant-and-current-owner
      parameters:
        - $ref: "#/components/parameters/RecoveryId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OwnershipRecoveryReviewRequest"
      responses:
        "201":
          description: Independent namespace recovery review recorded
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
            Idempotency-Replayed:
              $ref: "#/components/headers/IdempotencyReplayed"
            Location:
              $ref: "#/components/headers/ResourceLocation"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipRecoveryReviewRecord"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"
  /packages/api/v1/ownership-recoveries/{recovery_id}/actions/execute:
    post:
      tags:
        - Namespaces
      operationId: executeOwnershipRecovery
      summary: Execute an approved ownership recovery after notice
      description: |
        Registry namespace reviewers only; publishers and claimants are
        explicitly denied. Execution requires an approved independent review,
        the full 30-day notice, continued eligibility, and recent authentication.
        It changes registry authorization only and preserves all history.
      security:
        - bearerAuth: []
      x-seen-required-scopes:
        - registry:namespaces:recovery:execute
      x-seen-required-actor-role: registry-namespace-reviewer
      x-seen-explicitly-denied-actor-roles:
        - publisher
        - recovery-claimant
      x-seen-requires-recent-auth-seconds: 900
      parameters:
        - $ref: "#/components/parameters/RecoveryId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OwnershipRecoveryExecuteRequest"
      responses:
        "200":
          $ref: "#/components/responses/OwnershipRecoveryUpdated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthenticated"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Short-lived bearer credential issued by external Aether and accepted at
        the registry boundary. Passkey ceremonies, sessions, account recovery,
        credential issuance, rotation, and revocation are not registry API
        operations. The registry validates issuer, audience, subject, expiry,
        environment, scopes, and auth_time before applying its own resource
        authorization, explicit role denies, recent-auth, and separation-of-duty
        policies. Recent-auth operations compare the server clock to the JWT
        NumericDate auth_time; token expiry or issue time is not a substitute.
  parameters:
    Owner:
      name: owner
      in: path
      required: true
      description: Canonical lowercase owner segment
      schema:
        $ref: "#/components/schemas/PackageSegment"
    Name:
      name: name
      in: path
      required: true
      description: Canonical lowercase package-name segment
      schema:
        $ref: "#/components/schemas/PackageSegment"
    Version:
      name: version
      in: path
      required: true
      description: Exact semantic version; ranges and tags are rejected
      schema:
        $ref: "#/components/schemas/ExactVersion"
    ProofId:
      name: proof_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^prf_[A-Za-z0-9_-]{16,96}$"
    UploadId:
      name: upload_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^upl_[A-Za-z0-9_-]{16,96}$"
    MetadataFilename:
      name: metadata_filename
      in: path
      required: true
      description: |
        TUF metadata filename. Numeric prefixes identify immutable versions;
        only the configured environment and repository are served.
      schema:
        type: string
        pattern: "^(?:(?:root|timestamp)\\.json|[1-9][0-9]*\\.(?:root|snapshot|targets|releases|security)\\.json)$"
    ArchiveSha256Path:
      name: archive_sha256
      in: path
      required: true
      description: Lowercase SHA-256 of the exact requested archive bytes
      schema:
        $ref: "#/components/schemas/Sha256"
    ReportId:
      name: report_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^rpt_[A-Za-z0-9_-]{16,96}$"
    IncidentId:
      name: incident_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^inc_[A-Za-z0-9_-]{16,96}$"
    AppealId:
      name: appeal_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^apl_[A-Za-z0-9_-]{16,96}$"
    TransferId:
      name: transfer_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^ntr_[A-Za-z0-9_-]{16,96}$"
    RecoveryId:
      name: recovery_id
      in: path
      required: true
      schema:
        type: string
        pattern: "^nrc_[A-Za-z0-9_-]{16,96}$"
    Limit:
      name: limit
      in: query
      required: false
      description: Page size. Values above 100 fail instead of being silently clamped.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    Cursor:
      name: cursor
      in: query
      required: false
      description: |
        Opaque cursor bound to the authenticated principal, canonical path,
        filters, and sort order. Clients must not decode, edit, or transfer it.
      schema:
        type: string
        minLength: 1
        maxLength: 512
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Case-sensitive opaque key retained for at least 24 hours. Reusing it
        with the same scoped request replays the original response. Reusing it
        with a different fingerprint returns idempotency_key_reused.
      schema:
        type: string
        minLength: 16
        maxLength: 128
        pattern: "^[A-Za-z0-9._~-]+$"
    ArchiveDigestHeader:
      name: X-Seen-Archive-Sha256
      in: header
      required: true
      description: Lowercase SHA-256 hex of the complete request body
      schema:
        $ref: "#/components/schemas/Sha256"
    ContentLength:
      name: Content-Length
      in: header
      required: true
      description: Exact compressed body length in bytes
      schema:
        type: integer
        minimum: 1
        maximum: 26214400
  headers:
    RequestId:
      description: Stable request identifier mirrored in any error envelope
      required: true
      schema:
        type: string
        pattern: "^req_[A-Za-z0-9_-]{16,96}$"
    IdempotencyReplayed:
      description: True only when the original stored response was replayed
      required: true
      schema:
        type: boolean
    ResourceLocation:
      description: Canonical API path for the created or updated resource
      required: true
      schema:
        type: string
        pattern: "^/packages/api/v1/"
    DownloadLocation:
      description: |
        Immutable public URL or short-lived authorized private URL implementing
        the documented archive 200 response contract. Bearer credentials must
        never be forwarded to a different origin.
      required: true
      schema:
        type: string
        format: uri
    ArchiveSha256:
      description: Lowercase SHA-256 hex of the complete archive bytes
      required: true
      schema:
        $ref: "#/components/schemas/Sha256"
    ArchiveEtag:
      description: Strong content ETag encoded as quoted sha256 colon lowercase hex
      required: true
      schema:
        type: string
        pattern: '^"sha256:[0-9a-f]{64}"$'
    BlobContentLength:
      description: Exact complete archive body length in bytes
      required: true
      schema:
        type: integer
        minimum: 1
        maximum: 26214400
    BlobCacheControl:
      description: |
        public,max-age=31536000,immutable for publicly authorized bytes;
        private,no-store for authorized private bytes.
      required: true
      schema:
        type: string
        enum:
          - public,max-age=31536000,immutable
          - private,no-store
    MetadataSha256:
      description: Lowercase SHA-256 of the exact signed metadata response bytes
      required: true
      schema:
        $ref: "#/components/schemas/Sha256"
    MetadataDigestEtag:
      description: Strong content ETag for the exact metadata envelope bytes
      required: true
      schema:
        type: string
        pattern: '^"sha256:[0-9a-f]{64}"$'
    MetadataContentLength:
      description: Exact signed metadata body length in bytes
      required: true
      schema:
        type: integer
        minimum: 1
        maximum: 16777216
    MetadataCacheControl:
      description: |
        public,max-age=31536000,immutable for numerically versioned metadata;
        public,max-age=300,must-revalidate for unversioned bootstrap root or
        timestamp metadata.
      required: true
      schema:
        type: string
        enum:
          - public,max-age=31536000,immutable
          - public,max-age=300,must-revalidate
    MetadataEtag:
      description: Strong opaque ETag for this metadata representation
      required: true
      schema:
        type: string
        pattern: '^"[A-Za-z0-9._:-]{8,128}"$'
    RetryAfter:
      description: Decimal delay in seconds; equals error.retry_after_seconds
      required: true
      schema:
        type: integer
        minimum: 1
        maximum: 86400
    WwwAuthenticate:
      description: Bearer authentication challenge
      required: true
      schema:
        type: string
  schemas:
    PackageRecord:
      $ref: ./schemas/package-record.schema.json
    ReleaseRecord:
      $ref: ./schemas/release-record.schema.json
    SourceProof:
      $ref: ./schemas/source-proof.schema.json
    ScanAttestation:
      $ref: ./schemas/scan-attestation-v1.schema.json
    ErrorEnvelope:
      $ref: ./schemas/error-envelope.schema.json
    ParsedManifest:
      $ref: ./schemas/seen-manifest-v1.schema.json
    TufMetadataEnvelope:
      $ref: ./schemas/tuf-metadata-envelope-v1.schema.json
    SecurityReportCreateRequest:
      $ref: ./schemas/registry-api-workflows-v1.schema.json#/$defs/SecurityReportCreateRequest
    SecurityReportRecord:
      $ref: ./schemas/registry-api-workflows-v1.schema.json#/$defs/SecurityReportRecord
    EnforcementAppealCreateRequest:
      $ref: ./schemas/registry-api-workflows-v1.schema.json#/$defs/EnforcementAppealCreateRequest
    EnforcementAppealRecord:
      $ref: ./schemas/registry-api-workflows-v1.schema.json#/$defs/EnforcementAppealRecord
    AppealReviewRequest:
      $ref: ./schemas/registry-api-workflows-v1.schema.json#/$defs/AppealReviewRequest
    AppealReviewRecord:
      $ref: ./schemas/registry-api-workflows-v1.schema.json#/$defs/AppealReviewRecord
    SecurityQuarantineRequest:
      $ref: ./schemas/registry-api-workflows-v1.schema.json#/$defs/SecurityQuarantineRequest
    ReviewedReinstatementRequest:
      $ref: ./schemas/registry-api-workflows-v1.schema.json#/$defs/ReviewedReinstatementRequest
    SecurityActionRecord:
      $ref: ./schemas/registry-api-workflows-v1.schema.json#/$defs/SecurityActionRecord
    NamespaceTransferCreateRequest:
      $ref: ./schemas/registry-api-workflows-v1.schema.json#/$defs/NamespaceTransferCreateRequest
    NamespaceTransferAcceptRequest:
      $ref: ./schemas/registry-api-workflows-v1.schema.json#/$defs/NamespaceTransferAcceptRequest
    NamespaceTransferExecuteRequest:
      $ref: ./schemas/registry-api-workflows-v1.schema.json#/$defs/NamespaceTransferExecuteRequest
    NamespaceTransferRecord:
      $ref: ./schemas/registry-api-workflows-v1.schema.json#/$defs/NamespaceTransferRecord
    OwnershipRecoveryCreateRequest:
      $ref: ./schemas/registry-api-workflows-v1.schema.json#/$defs/OwnershipRecoveryCreateRequest
    OwnershipRecoveryReviewRequest:
      $ref: ./schemas/registry-api-workflows-v1.schema.json#/$defs/OwnershipRecoveryReviewRequest
    OwnershipRecoveryReviewRecord:
      $ref: ./schemas/registry-api-workflows-v1.schema.json#/$defs/OwnershipRecoveryReviewRecord
    OwnershipRecoveryExecuteRequest:
      $ref: ./schemas/registry-api-workflows-v1.schema.json#/$defs/OwnershipRecoveryExecuteRequest
    OwnershipRecoveryRecord:
      $ref: ./schemas/registry-api-workflows-v1.schema.json#/$defs/OwnershipRecoveryRecord
    PackageIdentity:
      $ref: ./schemas/package-identity.schema.json
    PackageSegment:
      type: string
      minLength: 1
      maxLength: 63
      pattern: "^[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?$"
    ExactVersion:
      type: string
      format: semver-exact
      maxLength: 128
      pattern: "^(?:0|[1-9][0-9]*)\\.(?:0|[1-9][0-9]*)\\.(?:0|[1-9][0-9]*)(?:-(?:0|[1-9][0-9]*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*)(?:\\.(?:0|[1-9][0-9]*|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*))*)?(?:\\+[0-9A-Za-z-]+(?:\\.[0-9A-Za-z-]+)*)?$"
    Sha256:
      type: string
      pattern: "^[0-9a-f]{64}$"
    UtcTimestamp:
      type: string
      format: date-time
      pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(?:\\.[0-9]{1,9})?Z$"
    Cursor:
      type: string
      minLength: 1
      maxLength: 512
    PackagePage:
      type: object
      additionalProperties: false
      required:
        - items
        - next_cursor
        - has_more
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/PackageRecord"
        next_cursor:
          oneOf:
            - $ref: "#/components/schemas/Cursor"
            - type: "null"
        has_more:
          type: boolean
    ReleasePage:
      type: object
      additionalProperties: false
      required:
        - items
        - next_cursor
        - has_more
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/ReleaseRecord"
        next_cursor:
          oneOf:
            - $ref: "#/components/schemas/Cursor"
            - type: "null"
        has_more:
          type: boolean
    SourceProofPage:
      type: object
      additionalProperties: false
      required:
        - items
        - next_cursor
        - has_more
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: "#/components/schemas/SourceProof"
        next_cursor:
          oneOf:
            - $ref: "#/components/schemas/Cursor"
            - type: "null"
        has_more:
          type: boolean
    CreatePackageRequest:
      type: object
      additionalProperties: false
      required:
        - identity
      properties:
        identity:
          $ref: "#/components/schemas/PackageIdentity"
        description:
          type: string
          maxLength: 512
        repository:
          type: string
          format: uri
          pattern: "^https://"
        license_spdx:
          type: string
          minLength: 1
          maxLength: 128
    ReserveReleaseRequest:
      type: object
      additionalProperties: false
      required:
        - version
        - visibility
        - archive
        - manifest_sha256
        - manifest
        - source
      properties:
        version:
          $ref: "#/components/schemas/ExactVersion"
        visibility:
          enum:
            - private
            - public
        archive:
          type: object
          additionalProperties: false
          required:
            - format
            - sha256
            - compressed_bytes
          properties:
            format:
              const: tar+gzip
            sha256:
              $ref: "#/components/schemas/Sha256"
            compressed_bytes:
              type: integer
              minimum: 1
              maximum: 26214400
        manifest_sha256:
          $ref: "#/components/schemas/Sha256"
        manifest:
          $ref: "#/components/schemas/ParsedManifest"
        source:
          $ref: "#/components/schemas/SourceDeclaration"
    SourceDeclaration:
      type: object
      additionalProperties: false
      required:
        - forge
        - repository_id
        - installation_id
        - requested_ref
        - expected_commit
        - license_spdx
      properties:
        forge:
          enum:
            - github
            - gitlab
        repository_id:
          type: string
          minLength: 1
          maxLength: 128
        installation_id:
          type: string
          minLength: 1
          maxLength: 128
        requested_ref:
          type: string
          minLength: 1
          maxLength: 255
        expected_commit:
          type: string
          pattern: "^(?:[0-9a-f]{40}|[0-9a-f]{64})$"
        license_spdx:
          type: string
          minLength: 1
          maxLength: 128
    ReleaseReservation:
      type: object
      additionalProperties: false
      required:
        - release
        - upload
      properties:
        release:
          $ref: "#/components/schemas/ReleaseRecord"
        upload:
          $ref: "#/components/schemas/UploadInstruction"
    UploadInstruction:
      type: object
      additionalProperties: false
      required:
        - upload_id
        - method
        - path
        - expires_at
        - maximum_bytes
        - required_headers
      properties:
        upload_id:
          type: string
          pattern: "^upl_[A-Za-z0-9_-]{16,96}$"
        method:
          const: PUT
        path:
          type: string
          pattern: "^/packages/api/v1/uploads/[A-Za-z0-9_-]+/archive$"
        expires_at:
          $ref: "#/components/schemas/UtcTimestamp"
        maximum_bytes:
          const: 26214400
        required_headers:
          type: object
          additionalProperties: false
          required:
            - Content-Type
            - Content-Length
            - X-Seen-Archive-Sha256
          properties:
            Content-Type:
              const: application/gzip
            Content-Length:
              type: integer
              minimum: 1
              maximum: 26214400
            X-Seen-Archive-Sha256:
              $ref: "#/components/schemas/Sha256"
    CompleteUploadRequest:
      type: object
      additionalProperties: false
      required:
        - archive_sha256
        - compressed_bytes
      properties:
        archive_sha256:
          $ref: "#/components/schemas/Sha256"
        compressed_bytes:
          type: integer
          minimum: 1
          maximum: 26214400
    YankReleaseRequest:
      type: object
      additionalProperties: false
      properties:
        reason:
          type: string
          maxLength: 512
        advisory_url:
          type: string
          format: uri
          pattern: "^https://"
  responses:
    SecurityActionSucceeded:
      description: Signed security availability change completed
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
        Idempotency-Replayed:
